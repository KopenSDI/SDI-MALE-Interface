            - importance
            - targetRef
            type: object
          status:
            description: MaleWorkloadStatus defines the observed state of MaleWorkload
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the workload's state
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveImportance:
                description: EffectiveImportance shows the importance values after
                  override application
                properties:
                  accuracy:
                    description: Accuracy importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                  energy:
                    description: Energy importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                  latency:
                    description: Latency importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                required:
                - accuracy
                - energy
                - latency
                type: object
              effectiveMcSpec:
                description: |-
                  EffectiveMCSpec shows the MC spec after MALE-Operator processing
                  Criticality may be overridden based on ALE importance analysis
                properties:
                  criticality:
                    description: Criticality is the final criticality level determined
                      by MALE-Operator
                    enum:
                    - A
                    - B
                    - C
                    type: string
                  missionId:
                    description: MissionId for grouping
                    type: string
                  missionType:
                    description: |-
                      MissionType detected from ALE importance values (based on MALE paper)
                      Values: "accuracy-critical", "latency-critical", "energy-critical", "balanced"
                    type: string
                  overrideReason:
                    description: OverrideReason explains why criticality was changed
                      (if overridden)
                    type: string
                  rtDeadline:
                    description: RTDeadline is the deadline in milliseconds
                    format: int32
                    type: integer
                  rtPeriod:
                    description: RTPeriod is the task period in milliseconds
                    format: int32
                    type: integer
                  rtWcet:
                    description: RTWcet is the Worst-Case Execution Time in milliseconds
                    format: int32
                    type: integer
                type: object
              lastEvaluationTime:
                description: LastEvaluationTime is the timestamp of the last evaluation
                format: date-time
                type: string
              mixedScore:
                description: |-
                  MixedScore is the calculated mixed importance score (0~1)
                  Based on MALE paper formula: MixedScore = wA*A + wL*L + wE*E
                type: number
              priorityClassName:
                description: PriorityClassName is the PriorityClass name assigned
                  to this workload
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
