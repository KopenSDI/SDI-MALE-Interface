  names:
    kind: MaleWorkload
    listKind: MaleWorkloadList
    plural: maleworkloads
    singular: maleworkload
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MaleWorkload is the Schema for the maleworkloads API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MaleWorkloadSpec defines the desired state of MaleWorkload
            properties:
              allowPolicyOverride:
                default: true
                description: AllowPolicyOverride allows policy engine to override
                  importance values
                type: boolean
              container:
                description: Container spec for the workload (used to generate RTContainer)
                properties:
                  args:
                    description: Args are the command arguments
                    items:
                      type: string
                    type: array
                  command:
                    description: Command is the entrypoint command
                    items:
                      type: string
                    type: array
                  env:
                    description: Env are environment variables
                    items:
                      description: EnvVar defines an environment variable
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  image:
                    description: Image is the container image
                    type: string
                  resources:
                    description: Resources are the resource requirements
                    properties:
                      limits:
                        description: ResourceList defines CPU and memory resources
                        properties:
                          cpu:
                            default: 100m
                            description: CPU resource (e.g., "100m", "0.5", "1")
                            type: string
                          memory:
                            default: 128Mi
                            description: Memory resource (e.g., "128Mi", "1Gi")
                            type: string
                        type: object
                      requests:
                        description: ResourceList defines CPU and memory resources
                        properties:
                          cpu:
                            default: 100m
                            description: CPU resource (e.g., "100m", "0.5", "1")
                            type: string
                          memory:
                            default: 128Mi
                            description: Memory resource (e.g., "128Mi", "1Gi")
                            type: string
                        type: object
                    type: object
                required:
                - image
                type: object
              importance:
                description: Importance defines the user-specified A,L,E values (0~1
                  float)
                properties:
                  accuracy:
                    description: Accuracy importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                  energy:
                    description: Energy importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                  latency:
                    description: Latency importance value in range [0,1]
                    maximum: 1
                    minimum: 0
                    type: number
                required:
                - accuracy
                - energy
                - latency
                type: object
              mcSpec:
                description: MCSpec defines Mixed-Criticality parameters for RT scheduling
                  on Edge cluster
                properties:
                  criticality:
                    default: A
                    description: |-
                      Criticality Level (C > B > A)
                      - C: Safety-Critical (collision avoidance, robot arm control)
                      - B: Mission-Critical (SLAM, sensor processing)
                      - A: Best-Effort RT (logging, monitoring)
                    enum:
                    - A
                    - B
                    - C
                    type: string
                  missionId:
                    description: MissionId groups related workloads for coordinated
                      scheduling
                    type: string
                  rtDeadline:
                    description: RTDeadline is the deadline in milliseconds (defaults
                      to RTPeriod)
                    format: int32
                    minimum: 1
                    type: integer
                  rtPeriod:
                    default: 100
                    description: RTPeriod is the task period in milliseconds
                    format: int32
                    minimum: 1
                    type: integer
                  rtWcet:
                    default: 30
                    description: RTWcet is the Worst-Case Execution Time in milliseconds
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              mission:
                description: Mission is a descriptive name for the workload mission
                type: string
              replicas:
                default: 1
                description: Replicas is the number of desired replicas
                format: int32
                minimum: 1
                type: integer
              schedulingHints:
                description: SchedulingHints provides additional hints for scheduling
                properties:
                  addAnnotations:
                    additionalProperties:
                      type: string
                    description: AddAnnotations are annotations to add to the Pod
                      template
                    type: object
                  addLabels:
                    additionalProperties:
                      type: string
                    description: AddLabels are labels to add to the Pod template
                    type: object
                type: object
              targetRef:
                description: TargetRef specifies the target workload resource
                properties:
                  apiVersion:
                    description: APIVersion of the target resource
                    type: string
                  kind:
                    description: Kind of the target resource (Deployment, StatefulSet,
                      Job, Pod, etc.)
                    type: string
                  name:
                    description: Name of the target resource
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
