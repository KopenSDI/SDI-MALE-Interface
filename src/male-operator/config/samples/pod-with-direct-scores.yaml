# Pod에 직접 점수를 붙여서 생성하는 예시
# 이 Pod는 MaleWorkload 없이도 점수가 적용됩니다

apiVersion: v1
kind: Pod
metadata:
  name: test-pod-with-scores
  namespace: default
  labels:
    # 직접 점수 지정 (라벨 방식)
    male.keti.dev/accuracy: "0.8"
    male.keti.dev/latency: "0.9"
    male.keti.dev/energy: "0.3"
    app: test-pod
spec:
  containers:
  - name: test-container
    image: nginx:latest
    ports:
    - containerPort: 80
---
# 애노테이션 방식 예시
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-with-scores-annotation
  namespace: default
  annotations:
    # 직접 점수 지정 (애노테이션 방식)
    male.keti.dev/accuracy: "0.7"
    male.keti.dev/latency: "0.8"
    male.keti.dev/energy: "0.2"
  labels:
    app: test-pod-annotation
spec:
  containers:
  - name: test-container
    image: nginx:latest
    ports:
    - containerPort: 80

