apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdi-analysis-engine
  namespace: default
  labels:
    app: sdi-analysis-engine
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdi-analysis-engine
  template:
    metadata:
      labels:
        app: sdi-analysis-engine
        version: v1
    spec:
      containers:
      - name: analysis-engine
        image: ketidevit2/sdi-analysis-engine:v0.1.8
        # мқҙлҜём§Җмқҳ м—”нҠёлҰ¬нҸ¬мқёнҠёк°Җ main.pyлқјл©ҙ argsл§Ң мһҲмңјл©ҙ лҗ©лӢҲлӢӨ.
        args: ["--both", "--grpc-port", "50051", "--rest-port", "5000"]

        ports:
        - containerPort: 50051
          name: grpc
          protocol: TCP
        - containerPort: 5000
          name: http
          protocol: TCP

        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: BOT
          value: "TURTLEBOT3-Burger-1"

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # мҠӨмјҖмӨ„лҹ¬к°Җ REST 5000м—җ л¶ҷмңјлҜҖлЎң HTTP /health мӮ¬мҡ©
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: influxdb-config
          mountPath: /app/influxdDB-Information.txt
          subPath: influxdDB-Information.txt
          readOnly: true
        - name: influxdb-token
          mountPath: /app/influxDB-TOKEN.txt
          subPath: influxDB-TOKEN.txt
          readOnly: true
      volumes:
      - name: influxdb-config
        configMap:
          name: influxdb-config
      - name: influxdb-token
        secret:
          secretName: influxdb-token
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: sdi-analysis-engine-service
  namespace: default
  labels:
    app: sdi-analysis-engine
spec:
  type: NodePort   # мҷёл¶Җ л…ём¶ң л¶Ҳн•„мҡ”н•ҳл©ҙ ClusterIPлЎң л°”кҝ”лҸ„ лҗ©лӢҲлӢӨ.
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30050   # н•„мҡ” м—Ҷмңјл©ҙ мқҙ мӨ„ м ңкұ°(ClusterIPмқј л•ҢлҸ„ м ңкұ°)
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 50051
    nodePort: 30051
    protocol: TCP
  selector:
    app: sdi-analysis-engine
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: influxdb-config
  namespace: default
data:
  influxdDB-Information.txt: |
    # InfluxDB Configuration
    # URL: http://<influxdb-host>:32086
    # ORG: keti
    # BUCKET: turtlebot
---
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-token
  namespace: default
type: Opaque
data:
  influxDB-TOKEN.txt: "<SET-VIA-SECRET-OR-ENV>"
